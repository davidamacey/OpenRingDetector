<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d0f14"/>

  <!-- Outer ring (doorbell shape) -->
  <circle cx="256" cy="256" r="180" stroke="#3B82F6" stroke-width="24" opacity="0.2"/>
  <circle cx="256" cy="256" r="140" stroke="#3B82F6" stroke-width="16" opacity="0.35"/>

  <!-- Camera lens (center) -->
  <circle cx="256" cy="230" r="72" fill="#1c1f2e" stroke="#3B82F6" stroke-width="8"/>
  <circle cx="256" cy="230" r="48" fill="#151820" stroke="#60A5FA" stroke-width="4"/>
  <circle cx="256" cy="230" r="24" fill="#3B82F6"/>
  <circle cx="256" cy="230" r="10" fill="#93C5FD"/>

  <!-- Camera lens reflection -->
  <circle cx="244" cy="218" r="6" fill="white" opacity="0.4"/>

  <!-- Doorbell button -->
  <rect x="234" y="320" width="44" height="20" rx="10" fill="#3B82F6"/>

  <!-- AI detection brackets (scanning effect) -->
  <!-- Top-left bracket -->
  <path d="M120 140 L120 110 L150 110" stroke="#22C55E" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Top-right bracket -->
  <path d="M392 140 L392 110 L362 110" stroke="#22C55E" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Bottom-left bracket -->
  <path d="M120 372 L120 402 L150 402" stroke="#22C55E" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Bottom-right bracket -->
  <path d="M392 372 L392 402 L362 402" stroke="#22C55E" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- AI sparkle dots -->
  <circle cx="380" cy="130" r="5" fill="#FCD34D"/>
  <circle cx="400" cy="150" r="3" fill="#FCD34D" opacity="0.6"/>
  <circle cx="132" cy="380" r="4" fill="#14B8A6"/>
</svg>
