server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    merge_slashes off;

    # API proxy (HTTP + WebSocket) — must come before static asset caching
    location /api/ {
        proxy_pass http://ring-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # Cache static assets (but NOT /api/ paths — handled above)
    location ~* ^(?!/api/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all unknown paths -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
